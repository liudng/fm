<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <title>fm 风格 1.3：背景充满 + 文件夹与双面板同步放大</title>
  <desc>背景圆角充满整个 128x128 区域，文件夹与双面板按比例放大并保持对称空隙</desc>

  <defs>
    <linearGradient id="bg13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="folder13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="folderTab13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="panel13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fffbeb"/>
    </linearGradient>
    <linearGradient id="header13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fed7aa"/>
      <stop offset="1" stop-color="#fdba74"/>
    </linearGradient>
    <!-- 文件夹投影（同步加大） -->
    <filter id="folderShadow13" x="-5%" y="-5%" width="110%" height="115%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.28"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景充满整个 128x128 区域（圆角加大至 28） -->
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#bg13)"/>
  <!-- 顶部高光 -->
  <rect x="0" y="0" width="128" height="64" rx="28" ry="28" fill="#ffffff" opacity="0.12"/>

  <!--
    同步放大对照表（1.2 → 1.3）：
      背景边距 8 → 0（充满），rx 24 → 28
      文件夹前片 80x56 → 96x60（放大 1.2x 宽，1.07x 高），rx 4 → 5
      文件夹后片 x=24-104 → x=16-112，y=30-100 → y=24-104，rx 4 → 5
      左面板 34x40 → 40x48，x=28 → 22
      右面板 34x40 → 40x48，x=66 → 66（保持）
      标题栏 6px → 6px（保持）
      文件项 5 行，行距 6 → 8，高度 3 → 3.5
  -->

  <!-- 文件夹组 -->
  <g filter="url(#folderShadow13)">
    <!-- 后片（含斜角 tab，整体放大） -->
    <path d="M 22 24 H 56 L 64 34 H 108 A 5 5 0 0 1 112 39 V 99 A 5 5 0 0 1 108 104 H 22 A 5 5 0 0 1 16 99 V 29 A 5 5 0 0 1 22 24 Z"
          fill="url(#folderTab13)"/>
    <!-- 前片（x=16-112，w=96；y=44-104，h=60） -->
    <rect x="16" y="44" width="96" height="60" rx="5" ry="5" fill="url(#folder13)"/>
  </g>

  <!--
    双面板居中布局：
    前片范围 x=16..112（w=96）
    左右各留 6px 空隙 → 可用宽度 84
    两面板间距 4px → 每面板宽度 (84-4)/2 = 40
    左面板：x=22, w=40 → 22..62
    右面板：x=66, w=40 → 66..106
    验证：左空隙 22-16=6，间距 66-62=4，右空隙 112-106=6（对称）
  -->

  <!-- 左面板 -->
  <rect x="22" y="52" width="40" height="48" rx="3" ry="3" fill="url(#panel13)"/>
  <!-- 左面板标题栏（仅顶部圆角） -->
  <path d="M 25 52 H 59 A 3 3 0 0 1 62 55 V 58 H 22 V 55 A 3 3 0 0 1 25 52 Z" fill="url(#header13)"/>
  <!-- 左面板文件项（5 行，行距 8px，高度 3.5） -->
  <rect x="26" y="64" width="28" height="3.5" rx="1.5" fill="#fb923c"/>
  <rect x="26" y="72" width="24" height="3.5" rx="1.5" fill="#e5e7eb"/>
  <rect x="26" y="80" width="28" height="3.5" rx="1.5" fill="#e5e7eb"/>
  <rect x="26" y="88" width="22" height="3.5" rx="1.5" fill="#e5e7eb"/>
  <rect x="26" y="96" width="26" height="3.5" rx="1.5" fill="#e5e7eb"/>

  <!-- 右面板 -->
  <rect x="66" y="52" width="40" height="48" rx="3" ry="3" fill="url(#panel13)"/>
  <!-- 右面板标题栏 -->
  <path d="M 69 52 H 103 A 3 3 0 0 1 106 55 V 58 H 66 V 55 A 3 3 0 0 1 69 52 Z" fill="url(#header13)"/>
  <!-- 右面板文件项 -->
  <rect x="70" y="64" width="24" height="3.5" rx="1.5" fill="#e5e7eb"/>
  <rect x="70" y="72" width="28" height="3.5" rx="1.5" fill="#fb923c"/>
  <rect x="70" y="80" width="26" height="3.5" rx="1.5" fill="#e5e7eb"/>
  <rect x="70" y="88" width="22" height="3.5" rx="1.5" fill="#e5e7eb"/>
  <rect x="70" y="96" width="28" height="3.5" rx="1.5" fill="#e5e7eb"/>
</svg>
