name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkgconf \
            qt6-base-dev qt6-tools-dev \
            libxkbcommon-dev \
            libgtest-dev \
            clang-tidy
          # 固定 clang-format 版本为 19.1.7，与本地开发环境一致
          # 不同版本的 clang-format 对 CJK 字符宽度的计算方式不同，
          # 会导致带中文注释的对齐产生不同结果。通过 pip 安装指定版本。
          python3 -m pip install --user clang-format==19.1.7
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check code formatting
        run: |
          find src tests \( -name '*.cpp' -o -name '*.h' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

      - name: Configure (tests + compile_commands)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DFM_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: clang-tidy
        continue-on-error: true
        run: |
          run-clang-tidy -p build -warnings-as-errors='*' \
            $(find src -name '*.cpp' | grep -v 'main.cpp')

      - name: ASan build + test
        run: |
          cmake -B build-asan -G Ninja \
            -DFM_BUILD_TESTS=ON \
            -DFM_ENABLE_ASAN=ON
          cmake --build build-asan --parallel
          ctest --test-dir build-asan --output-on-failure

  wait-for-images:
    name: Wait for builder images
    runs-on: ubuntu-latest
    steps:
      - name: Wait for build-image.yml to complete
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          # Sleep briefly so any concurrently-triggered workflow can register
          sleep 5
          for i in $(seq 1 60); do
            response=$(curl -fsSL -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/workflows/build-image.yml/runs?head_sha=$HEAD_SHA" 2>/dev/null) \
              || { echo "GitHub API call failed; skipping wait (degraded mode)."; exit 0; }
            active=$(echo "$response" | jq \
              '[.workflow_runs[] | select(.status == "in_progress" or .status == "queued")] | length' 2>/dev/null) \
              || { echo "jq parse failed; skipping wait (degraded mode)."; exit 0; }
            if [ "$active" -eq 0 ]; then
              echo "No active build-image.yml runs for $HEAD_SHA."
              exit 0
            fi
            echo "build-image.yml has $active active run(s) for $HEAD_SHA; waiting 30s..."
            sleep 30
          done
          echo "Timed out after 30 minutes; proceeding with possibly stale image."
          exit 0

  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    needs: [quality, wait-for-images]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: debian-13
            arch: amd64
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:debian-trixie
            cpack_gens: "TGZ;DEB"
          - os: debian-13
            arch: arm64
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:debian-trixie
            cpack_gens: "TGZ;DEB"
          - os: fedora-42
            arch: amd64
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:fedora-42
            cpack_gens: "TGZ;RPM"
          - os: fedora-42
            arch: arm64
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:fedora-42
            cpack_gens: "TGZ;RPM"

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for arm64
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build in container
        run: |
          set -euo pipefail
          build_dir=build-${{ matrix.os }}-${{ matrix.arch }}
          docker pull "${{ matrix.builder }}"
          docker run --rm --platform=linux/${{ matrix.arch }} \
            -e BUILD_DIR="$build_dir" \
            -e CPACK_GENS="${{ matrix.cpack_gens }}" \
            -v "$PWD:/workspace" -w /workspace "${{ matrix.builder }}" bash -lc '
            set -euo pipefail
            mkdir -p "$BUILD_DIR"
            cd "$BUILD_DIR"
            cmake -DCMAKE_BUILD_TYPE=Release ..
            cmake --build . -- -j$(nproc)
            cpack -G "$CPACK_GENS"
          '

