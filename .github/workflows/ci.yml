name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkgconf \
            qt6-base-dev qt6-tools-dev \
            clang-tidy
          # 固定 clang-format 版本为 19.1.7，与本地开发环境一致
          # 不同版本的 clang-format 对 CJK 字符宽度的计算方式不同，
          # 会导致带中文注释的对齐产生不同结果。通过 pip 安装指定版本。
          python3 -m pip install --user clang-format==19.1.7
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check code formatting
        run: |
          find src tests \( -name '*.cpp' -o -name '*.h' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

      - name: Configure (tests + compile_commands)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DFM_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: clang-tidy
        continue-on-error: true
        run: |
          run-clang-tidy -p build -warnings-as-errors='*' \
            $(find src -name '*.cpp' | grep -v 'main.cpp')

      - name: ASan build + test
        run: |
          cmake -B build-asan -G Ninja \
            -DFM_BUILD_TESTS=ON \
            -DFM_ENABLE_ASAN=ON
          cmake --build build-asan --parallel
          ctest --test-dir build-asan --output-on-failure

  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: debian-13
            arch: amd64
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:debian-trixie
          - os: debian-13
            arch: arm64
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:debian-trixie
          - os: fedora-42
            arch: amd64
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:fedora-42
          - os: fedora-42
            arch: arm64
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:fedora-42

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for arm64
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build in container
        run: |
          set -euo pipefail
          build_dir=build-${{ matrix.os }}-${{ matrix.arch }}
          docker pull "${{ matrix.builder }}"
          docker run --rm --platform=linux/${{ matrix.arch }} -e BUILD_DIR="$build_dir" -v "$PWD:/workspace" -w /workspace "${{ matrix.builder }}" bash -lc '
            set -euo pipefail
            mkdir -p "$BUILD_DIR"
            cd "$BUILD_DIR"
            cmake -DCMAKE_BUILD_TYPE=Release ..
            cmake --build . -- -j$(nproc)
          '

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fm-${{ matrix.os }}-${{ matrix.arch }}
          path: build-${{ matrix.os }}-${{ matrix.arch }}/fm
