name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: debian-13
            arch: amd64
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:debian-trixie
          - os: debian-13
            arch: arm64
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:debian-trixie
          - os: fedora-42
            arch: amd64
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:fedora-42
          - os: fedora-42
            arch: arm64
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:fedora-42

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for arm64
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build in container
        run: |
          set -euo pipefail
          build_dir=build-${{ matrix.os }}-${{ matrix.arch }}
          tag_name="${GITHUB_REF#refs/tags/}"
          docker pull "${{ matrix.builder }}"
          docker run --rm --platform=linux/${{ matrix.arch }} -e BUILD_DIR="$build_dir" -e TAG_NAME="$tag_name" -v "$PWD:/workspace" -w /workspace "${{ matrix.builder }}" bash -lc '
            set -euo pipefail
            mkdir -p "$BUILD_DIR"
            cd "$BUILD_DIR"
            cmake -DCMAKE_BUILD_TYPE=Release ..
            cmake --build . -- -j$(nproc)
            # 构建安装目录结构
            stage="/workspace/stage"
            rm -rf "$stage"
            mkdir -p "$stage/bin" \
                     "$stage/share/applications" \
                     "$stage/share/icons/hicolor/512x512/apps" \
                     "$stage/share/man/man1"
            cp fm "$stage/bin/"
            cp /workspace/fm.desktop "$stage/share/applications/"
            cp /workspace/fm.png "$stage/share/icons/hicolor/512x512/apps/"
            cp /workspace/fm.1 "$stage/share/man/man1/"
            gzip -9f "$stage/share/man/man1/fm.1"
            tar czf "/workspace/fm-qt-${{ matrix.os }}-${{ matrix.arch }}-${TAG_NAME}.tar.gz" -C "$stage" .
          '

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fm-qt-${{ matrix.os }}-${{ matrix.arch }}
          path: fm-qt-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          find artifacts -name '*.tar.gz' -print0 | while IFS= read -r -d '' file; do
            echo "Uploading $file"
            gh release upload "${GITHUB_REF#refs/tags/}" "$file" --clobber
          done
