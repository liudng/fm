name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: debian-13
            arch: amd64
            runner: ubuntu-latest
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:debian-trixie
            cpack_gens: "TGZ;DEB"
          - os: debian-13
            arch: arm64
            runner: ubuntu-24.04-arm
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:debian-trixie
            cpack_gens: "TGZ;DEB"
          - os: fedora-42
            arch: amd64
            runner: ubuntu-latest
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:fedora-42
            cpack_gens: "TGZ;RPM"
          - os: fedora-42
            arch: arm64
            runner: ubuntu-24.04-arm
            builder: ghcr.io/${{ github.repository_owner }}/fm-qt-builder:fedora-42
            cpack_gens: "TGZ;RPM"

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build in container
        run: |
          set -euo pipefail
          build_dir=build-${{ matrix.os }}-${{ matrix.arch }}
          docker pull "${{ matrix.builder }}"
          docker run --rm --platform=linux/${{ matrix.arch }} \
            -e BUILD_DIR="$build_dir" \
            -e CPACK_GENS="${{ matrix.cpack_gens }}" \
            -v "$PWD:/workspace" -w /workspace "${{ matrix.builder }}" bash -lc '
            set -euo pipefail
            mkdir -p "$BUILD_DIR"
            cd "$BUILD_DIR"
            cmake -DCMAKE_BUILD_TYPE=Release ..
            cmake --build . -- -j$(nproc)
            cpack -G "$CPACK_GENS"
          '

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fm-qt-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            build-${{ matrix.os }}-${{ matrix.arch }}/*.tar.gz
            build-${{ matrix.os }}-${{ matrix.arch }}/*.deb
            build-${{ matrix.os }}-${{ matrix.arch }}/*.rpm
          if-no-files-found: error

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          find artifacts \( -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' \) -print0 \
            | while IFS= read -r -d '' file; do
              echo "Uploading $file"
              gh release upload "${GITHUB_REF#refs/tags/}" "$file" --clobber
            done
